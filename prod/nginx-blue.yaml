apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-web
    version: blue
  name: nginx-web-blue
  namespace: prod
spec:
  replicas: 3
  strategy: # surge-first: a new Ready pod is added before any old pod is removed
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0 # required 1-per-node anti-affinity can't place a surge pod (every node full for this color)
      maxUnavailable: 1 # so roll one-at-a-time: free a node, then schedule the new pod onto it
  selector:
    matchLabels:
      app: nginx-web
      version: blue
  template:
    metadata:
      labels:
        app: nginx-web
        version: blue
      annotations:
        ad.datadoghq.com/nginx.checks: |
          {
            "nginx": {
              "init_config": {},
              "instances": [
                {
                  "nginx_status_url":"http://%%host%%:8081/nginx_status/"
                }
              ]
            }
          }
        ad.datadoghq.com/nginx.logs: '[{"source":"nginx","service":"nginx"}]'
    spec:
      affinity:
        nodeAffinity: # only schedule where the images hostPath exists (the 3 workers)
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["worker1", "worker2", "worker3"]
        podAntiAffinity: # REQUIRED: exactly one blue pod per node; a drained node's pod stays Pending until that node returns, then refills it
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: nginx-web
                  version: blue
      containers:
        - name: nginx
          image: technotuba/nginx@sha256:6d99ae03e5059578577bfd7a614bb0b1f08eaead08a551233ecbc6910a5ffc5a # P0: pinned to current running digest
          imagePullPolicy: IfNotPresent # P0: was Always
          securityContext: # harden: non-root, read-only rootfs, no caps (listeners now >=1024)
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: nginx-status
          readinessProbe: # P3
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          lifecycle: # P4
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5; nginx -s quit"]
          resources: # P5: realistic request so HPA Utilization is meaningful
            requests:
              cpu: 250m # was 100m
            limits:
              cpu: "1"
          volumeMounts:
            - mountPath: /var/log/nginx
              name: nginx-logs
            - mountPath: /usr/share/nginx/html
              name: www-volume
            - mountPath: /etc/nginx/nginx.conf
              name: config-volume
              subPath: nginx.conf
            - mountPath: /usr/share/nginx/html/image
              name: images-volume
            - mountPath: /etc/nginx/conf.d/status.conf
              name: config
              readOnly: true
              subPath: status.conf
            - mountPath: /var/cache/nginx # writable temp dirs for readOnlyRootFilesystem
              name: nginx-cache
            - mountPath: /var/run # nginx pid file (pid /var/run/nginx.pid)
              name: nginx-run
            - mountPath: /tmp
              name: nginx-tmp
        - name: fail2ban
          image: crazymax/fail2ban:latest
          resources:
            requests:
              cpu: 1m
          securityContext: # rec #2: deprivileged — bans go via the Cloudflare API, not local iptables
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /var/log/nginx
              name: nginx-logs
            - mountPath: /etc/fail2ban/action.d/cloudflare-ban.conf
              name: fail2ban-config-cloudflare
              subPath: cloudflare-ban.conf
            - mountPath: /etc/cloudflare
              name: cloudflare-creds
            - mountPath: /usr/local/bin/fail2ban-cloudflare-ban.sh
              name: ban-script
              subPath: fail2ban-cloudflare-ban.sh
            - mountPath: /etc/fail2ban/fail2ban.conf
              name: fail2ban-main-config
              subPath: fail2ban.conf
            - mountPath: /etc/fail2ban/jail.local
              name: fail2ban-config
              subPath: jail.local
            - mountPath: /etc/fail2ban/filter.d/nginx-404.conf
              name: fail2ban-config
              subPath: nginx-404.conf
      automountServiceAccountToken: false # rec #4: static web server never calls the k8s API
      serviceAccountName: prod
      terminationGracePeriodSeconds: 30 # P4
      volumes:
        - configMap:
            name: fail2ban-config
          name: fail2ban-config-cloudflare
        - configMap:
            name: fail2ban-cloudflare-ban-script
            defaultMode: 0755
          name: ban-script
        - name: cloudflare-creds
          secret:
            secretName: cloudflare-creds
        - configMap:
            name: fail2ban-main-config
          name: fail2ban-main-config
        - configMap:
            name: nginx-config
          name: config
        - configMap:
            name: fail2ban-config
          name: fail2ban-config
        - configMap:
            name: www-configmap
          name: www-volume
        - configMap:
            name: nginx-config
          name: config-volume
        - hostPath:
            path: /home/huey/www/images
            type: Directory
          name: images-volume
        - hostPath:
            path: /var/log/nginx
            type: DirectoryOrCreate
          name: nginx-logs
        - name: nginx-cache # readOnlyRootFilesystem writable mounts (emptyDir is 0777 -> uid 101 writes; no fsGroup)
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
