  apiVersion: apps/v1
  kind: Deployment                      # P2: was DaemonSet
  metadata:
    labels:
      app: nginx-web
      version: green
      k8slens-edit-resource-version: v1
    name: nginx-web-green
    namespace: prod
  spec:
    replicas: 3                         # P2: mirror blue
    strategy:                           # surge-first: never drop below desired Ready
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    selector:
      matchLabels:
        app: nginx-web
        version: green
    template:
      metadata:
        labels:
          app: nginx-web
          version: green
        annotations:
          ad.datadoghq.com/nginx.checks: |
            {
              "nginx": {
                "init_config": {},
                "instances": [
                  {
                    "nginx_status_url":"http://%%host%%:81/nginx_status/"
                  }
                ]
              }
            }
          ad.datadoghq.com/nginx.logs: '[{"source":"nginx","service":"nginx"}]'
      spec:
        terminationGracePeriodSeconds: 30   # P4
        affinity:
          nodeAffinity:                     # P2: only schedule where the images hostPath exists (all 3 workers confirmed)
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values: ["worker1", "worker2", "worker3"]
          podAntiAffinity:                  # spread the 3 replicas across nodes
            preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: nginx-web
                    version: green
        containers:
        - name: nginx
          image: technotuba/nginx@sha256:a4d88848452f4cca22afd98d47768ebe3c2f9c9c002e56faad9f25895681a3e1   # P0: pinned to current running digest
          imagePullPolicy: IfNotPresent     # P0: was Always
          ports:
          - containerPort: 80
          - containerPort: 81
          readinessProbe:                   # P3
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          lifecycle:                        # P4
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5; nginx -s quit"]
          resources:                        # P5: realistic request so HPA Utilization is meaningful
            requests:
              cpu: 250m
            limits:
              cpu: "1"
          volumeMounts:
          - mountPath: /usr/share/nginx/html
            name: www-volume
          - mountPath: /etc/nginx/nginx.conf
            name: config-volume
            subPath: nginx.conf
          - mountPath: /usr/share/nginx/html/image
            name: images-volume
          - mountPath: /etc/nginx/conf.d/status.conf
            name: config
            readOnly: true
            subPath: status.conf
          - mountPath: /var/log/nginx
            name: nginx-logs
        - name: fail2ban
          image: crazymax/fail2ban:latest
          resources:
            requests:
              cpu: 1m
          securityContext:
            privileged: true
          volumeMounts:
          - mountPath: /etc/fail2ban/action.d/cloudflare-ban.conf
            name: fail2ban-config-cloudflare
            subPath: cloudflare-ban.conf
          - mountPath: /etc/cloudflare
            name: cloudflare-creds
          - mountPath: /usr/local/bin/fail2ban-cloudflare-ban.sh
            name: ban-script
            subPath: fail2ban-cloudflare-ban.sh
          - mountPath: /etc/fail2ban/fail2ban.conf
            name: fail2ban-main-config
            subPath: fail2ban.conf
          - mountPath: /etc/fail2ban/jail.local
            name: fail2ban-config
            subPath: jail.local
          - mountPath: /etc/fail2ban/filter.d/nginx-404.conf
            name: fail2ban-config
            subPath: nginx-404.conf
          - mountPath: /var/log/nginx
            name: nginx-logs
        serviceAccountName: prod
        volumes:
        - hostPath:
            path: /var/log/nginx
            type: DirectoryOrCreate
          name: nginx-logs
        - configMap:
            name: fail2ban-config
          name: fail2ban-config-cloudflare
        - configMap:
            name: fail2ban-cloudflare-ban-script
            defaultMode: 0755
          name: ban-script
        - name: cloudflare-creds
          secret:
            secretName: cloudflare-creds
        - configMap:
            name: fail2ban-main-config
          name: fail2ban-main-config
        - configMap:
            name: nginx-config
          name: config
        - configMap:
            name: fail2ban-config
          name: fail2ban-config
        - configMap:
            name: www-configmap
          name: www-volume
        - configMap:
            name: nginx-config
          name: config-volume
        - hostPath:
            path: /home/huey/www/images
            type: Directory
          name: images-volume
