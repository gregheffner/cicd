apiVersion: apps/v1
kind: Deployment # P2: was DaemonSet
metadata:
  labels:
    app: nginx-web
    version: green
  name: nginx-web-green
  namespace: prod
spec:
  replicas: 3 # P2: mirror blue
  strategy: # surge-first: never drop below desired Ready
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0 # required 1-per-node anti-affinity can't place a surge pod (every node full for this color)
      maxUnavailable: 1 # so roll one-at-a-time: free a node, then schedule the new pod onto it
  selector:
    matchLabels:
      app: nginx-web
      version: green
  template:
    metadata:
      labels:
        app: nginx-web
        version: green
      annotations:
        ad.datadoghq.com/nginx.checks: |
          {
            "nginx": {
              "init_config": {},
              "instances": [
                {
                  "nginx_status_url":"http://%%host%%:8081/nginx_status/"
                }
              ]
            }
          }
        ad.datadoghq.com/nginx.logs: '[{"source":"nginx","service":"nginx"}]'
    spec:
      terminationGracePeriodSeconds: 30 # P4
      affinity:
        nodeAffinity: # P2: only schedule where the images hostPath exists (all 3 workers confirmed)
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["worker1", "worker2", "worker3"]
        podAntiAffinity: # REQUIRED: exactly one green pod per node; a drained node's pod stays Pending until that node returns, then refills it
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: nginx-web
                  version: green
      # fail2ban runs as a NATIVE SIDECAR (initContainer + restartPolicy: Always, k8s >=1.29).
      # Outage review 2026-06-25: as a plain sidecar with no readinessProbe, a fail2ban
      # OOM/liveness restart flipped Pod.Ready=false and ejected the healthy nginx from the
      # Service. As a native sidecar it no longer gates Pod.Ready, so its restarts never
      # pull nginx out of nginx-service.
      initContainers:
        - name: fail2ban
          image: crazymax/fail2ban:latest
          restartPolicy: Always # makes this restartable init container a native sidecar
          resources:
            requests:
              cpu: 1m
              memory: 64Mi # rec #6
            limits:
              memory: 256Mi # rec #6 (raised 128->256 per outage review; live RSS ~34Mi)
          livenessProbe: # rec #9b: restart if the fail2ban server stops responding
            exec:
              command: ["fail2ban-client", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext: # rec #2: deprivileged — bans go via the Cloudflare API, not local iptables
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /etc/fail2ban/action.d/cloudflare-ban.conf
              name: fail2ban-config-cloudflare
              subPath: cloudflare-ban.conf
            - mountPath: /etc/cloudflare
              name: cloudflare-creds
            - mountPath: /usr/local/bin/fail2ban-cloudflare-ban.sh
              name: ban-script
              subPath: fail2ban-cloudflare-ban.sh
            - mountPath: /usr/local/bin/fail2ban-cloudflare-unban.sh
              name: ban-script
              subPath: fail2ban-cloudflare-unban.sh
            - mountPath: /usr/local/bin/is-dd-synthetic.sh
              name: ban-script
              subPath: is-dd-synthetic.sh
            - mountPath: /etc/fail2ban/fail2ban.conf
              name: fail2ban-main-config
              subPath: fail2ban.conf
            - mountPath: /etc/fail2ban/jail.local
              name: fail2ban-config
              subPath: jail.local
            - mountPath: /etc/fail2ban/filter.d/nginx-404.conf
              name: fail2ban-config
              subPath: nginx-404.conf
            - mountPath: /var/log/nginx
              name: nginx-logs
      containers:
        - name: nginx
          image: technotuba/nginx@sha256:6d99ae03e5059578577bfd7a614bb0b1f08eaead08a551233ecbc6910a5ffc5a # P0: pinned to current running digest
          imagePullPolicy: IfNotPresent # P0: was Always
          securityContext: # harden: non-root, read-only rootfs, no caps (listeners now >=1024)
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: nginx-status
          readinessProbe: # P3
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe: # rec #7/#22: restart if nginx stops serving (cheap /healthz, no disk)
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle: # P4
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5; nginx -s quit"]
          resources: # P5: realistic request so HPA Utilization is meaningful
            requests:
              cpu: 250m
              memory: 64Mi # rec #6
            limits:
              cpu: "1"
              memory: 256Mi # rec #6: bound rss (static server is light; generous headroom vs OOM)
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: www-volume
            - mountPath: /etc/nginx/nginx.conf
              name: config-volume
              subPath: nginx.conf
            - mountPath: /usr/share/nginx/html/image
              name: images-volume
            - mountPath: /etc/nginx/conf.d/status.conf
              name: config
              readOnly: true
              subPath: status.conf
            - mountPath: /var/log/nginx
              name: nginx-logs
            - mountPath: /var/cache/nginx # writable temp dirs for readOnlyRootFilesystem
              name: nginx-cache
            - mountPath: /var/run # nginx pid file (pid /var/run/nginx.pid)
              name: nginx-run
            - mountPath: /tmp
              name: nginx-tmp
      automountServiceAccountToken: false # rec #4: static web server never calls the k8s API
      serviceAccountName: prod
      volumes:
        - hostPath:
            path: /var/log/nginx
            type: DirectoryOrCreate
          name: nginx-logs
        - configMap:
            name: fail2ban-config
          name: fail2ban-config-cloudflare
        - configMap:
            name: fail2ban-cloudflare-ban-script
            defaultMode: 0755
          name: ban-script
        - name: cloudflare-creds
          secret:
            secretName: cloudflare-creds
        - configMap:
            name: fail2ban-main-config
          name: fail2ban-main-config
        - configMap:
            name: nginx-config
          name: config
        - configMap:
            name: fail2ban-config
          name: fail2ban-config
        - configMap:
            name: www-configmap
          name: www-volume
        - configMap:
            name: nginx-config
          name: config-volume
        - hostPath:
            path: /home/huey/www/images
            type: Directory
          name: images-volume
        - name: nginx-cache # readOnlyRootFilesystem writable mounts (emptyDir is 0777 -> uid 101 writes; no fsGroup)
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
