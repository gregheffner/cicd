# datadog/datadog-secret — sourced from 1Password (vault k8s-cluster-secrets, item "datadog-secret").
# Do NOT remove from the include allowlist without a planned rotation (prune would delete the Secret).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: datadog-secret
  namespace: datadog
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: datadog-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: datadog-secret/api-key
