# external-secrets/external-secrets-operator-app.yaml  (apply ONCE as cluster-admin to bootstrap)
# Installs External Secrets Operator via its Helm chart (ArgoCD renders server-side, so the
# repo stays raw-YAML — only this Application CR is committed). Sync-wave 0: CRDs+operator
# must exist before the ClusterSecretStore/ExternalSecret CRs (a later wave-1 config app).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: automation
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.7.0          # PINNED — do not float
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        replicaCount: 2             # HA controller
        leaderElect: true          # required when replicaCount > 1
        webhook:
          replicaCount: 2
        certController:
          replicaCount: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true       # ESO CRDs exceed the client-side-apply annotation limit
