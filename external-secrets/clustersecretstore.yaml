# ClusterSecretStore — how ESO authenticates to 1Password. NO secret values here.
# Auth = the out-of-band Secret external-secrets/onepassword-token (the k8s-eso
# service-account token), which is NOT in git. One store == one vault.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: onepassword
spec:
  conditions:
    - namespaces: [cloudflared, default, prod, datadog, radar, automation]
  provider:
    onepasswordSDK:
      vault: "k8s-cluster-secrets"
      auth:
        serviceAccountSecretRef:
          name: onepassword-token
          key: token
          namespace: external-secrets
