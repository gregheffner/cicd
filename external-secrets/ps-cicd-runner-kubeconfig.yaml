# external-secrets/ps-cicd-runner-kubeconfig.yaml
# PushSecret (cluster -> 1Password): backs up the runner's complete kubeconfig
# (server + CA + token, mirrored from /home/huey/.kube/cicd-runner.conf into
# Secret automation/cicd-runner-kubeconfig) to its own vault item. Separate op
# item from cicd-runner-token so the two controllers never write one item.
# NOTE: the in-cluster Secret is a manual mirror — recreate it if the file on
# K8-Primary is ever regenerated (e.g. token rotation).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: cicd-runner-kubeconfig
  namespace: automation
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: onepassword
      kind: ClusterSecretStore
  selector:
    secret:
      name: cicd-runner-kubeconfig
  deletionPolicy: None
  data:
    - match:
        secretKey: kubeconfig
        remoteRef:
          remoteKey: cicd-runner-kubeconfig
          property: kubeconfig
