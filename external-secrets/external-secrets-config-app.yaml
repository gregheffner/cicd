# external-secrets/external-secrets-config-app.yaml  (apply ONCE as cluster-admin to bootstrap)
# Wave 1 (after the operator's CRDs exist). Manages the ClusterSecretStore and every
# ExternalSecret/PushSecret CR (es-*.yaml), added one per secret during migration.
# directory.include allowlists the workload files and EXCLUDES the two *-app.yaml files.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: automation
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/gregheffner/cicd
    targetRevision: main
    path: external-secrets
    directory:
      include: '{clustersecretstore.yaml,es-*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
