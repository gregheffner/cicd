      <div class="header">
        <h1 class="header-text">GREG HEFFNER</h1>
      </div>
      <div class="sub-header">A father, veteran, and nerd</div>
      <h2 class="visually-hidden">A website about learning</h2>
      <div class="text-container">
        <div class="column">
            <br>
            <div style="margin-bottom: 12px;"><b>Hello!</b> Welcome to my home lab. Here, automation is a daily habit, and curiosity drives every project. I'm Greg Heffner: builder, veteran, and digital transformation leader. Code, radio, and weather maps all get their turn, and every deployment is a new lesson. This GitHub is my playground and lab notebook, focused on reliability, innovation, and always getting better. Glad you're here.
            </div>
            <h3>Who Am I?</h3>
            <ul style="margin-bottom: 0.5em;">
                <li><b>Senior Technology Leader: </b>Over 20 years of enterprise operations and digital transformation experience, leading teams and architecting solutions for mission-critical environments.</li>
                <li><b>Strategic Automator: </b>I design self-healing infrastructure, CI/CD pipelines, and zero-downtime deployments. If it can be automated, I want to make it work better.</li>
                <li><b>Veteran:</b> U.S. Army Air Defense, communications specialist. I value discipline, clear communication, and always having a backup plan.</li>
                <li><b>Open Source Advocate:</b> I share code, documentation, and ideas so others can learn and build on them.</li>
                <li><b>Lifelong Learner:</b> From Kubernetes to cybersecurity, I follow my curiosity and document what I learn to help others avoid the same roadblocks.</li>
            </ul>
            <h3>Philosophy</h3>
            <p style="margin-bottom: 0.5em;">
                <b>Build in public. Automate the boring stuff. Share what works (and what doesn't).</b> I believe tech should be accessible, fun, and a little bit weird. My home lab is my playground, and my blog is where I share the journey: wins, fails, and all.
            </p>
            <br>
            <h3>What Makes Me Tick?</h3>
            <ul style="margin-bottom: 0.5em;">
                <li><b>Blue Green Deployments:</b> I run my own blue green Nginx clusters, with live cutovers and zero downtime updates. GitOps and ArgoCD keep it honest.</li>
                <li><b>Weather & Radio:</b> Built a live weather radar and radio dashboard for my local community. If it's on the air or in the cloud, I want to see it.</li>
                <li><b>CI/CD & Monitoring:</b> Everything is versioned, tested, and monitored. If it breaks, I want to know before anyone else does.</li>
                <li><b>Learning in Public:</b> My blog and GitHub README are living docs. Check them for my latest experiments, guides, and rants.</li>
            </ul>
            <h3>Handy Links</h3>
            <div style="margin-bottom: 6px; color: #8b949e; font-size: 1em;">Useful resources and favorite tools I use for radio, weather, and network monitoring:</div>
            <ul class="link-list">
                <li><a href="https://greg.heffner.live/traffic.html">Live Traffic Cams</a></li>
                <li><a href="https://sarnetfl.org/uploads/6/1/7/0/61701057/20230910_sarnet_map.pdf">SARNET</a></li>
                <li><a href="https://stats.allstarlink.org/stats/52914">Radio Map</a></li>
                <li><a href="https://jaxpiercam.com">Jax Beach Pier Live</a></li>
                <li><a href="https://firstcoastdmr.org/index.php/dmr-info/">Jax DMR Site</a></li>
                <li><a href="https://gchq.github.io/CyberChef/">CyberChef</a></li>
                <li><a href="https://radar.weather.gov/ridge/standard/SOUTHEAST_loop.gif">Radar Loop SE</a></li>
                <li><a href="https://ui.com/introduction">Shop Network Gear</a></li>
                <li><a href="https://www.spaghettimodels.com">Spaghetti Models</a></li>
                <li><a href="https://brandmeister.network">Brandmeister DMR</a></li>
                <li><a href="http://192.223.28.176:42420/CallWatch">DMR Logs</a></li>
                <li><a href="https://stats.allstarlink.org/stats/52914/networkMap">Allstar Radio Map</a></li>
            </ul>
        </div>
        <div class="column">
            <h3>Explore My Online Repos</h3>
            <ul>
                <li><a href="https://github.com/GregHeffner"><b>GitHub</b></a>: Automation scripts, playbooks, and my latest experiments.</li>
                <li><a href="https://hub.docker.com/u/technotuba"><b>DockerHub</b></a>: Custom container images that power this site and my projects.</li>
                <li><a href="https://galaxy.ansible.com/ui/search/?keywords=gregheffner"><b>Ansible Galaxy</b></a>: Curated roles & collections for infrastructure as code.</li>
            </ul>
            <h3>Read My Blog</h3>
            <ul>
                <li><a href="https://greg.heffner.live/blog.html"><b>Nerdsense – A Blog</b></a>: Deep dives into tech, automation, and learning. Suggest topics via my contact link!</li>
                <li><a href="https://medium.com/@light.pen8923"><b>Medium (Blog Re-Post)</b></a>: Mirror of my main blog for wider reach.</li>
            </ul>
            <h3>How My Site Runs</h3>
            <div style="margin-bottom: 8px; font-size: 1em;">
                This site is powered by Kubernetes and automated CI/CD pipelines using ArgoCD. Every update, deployment, and rollback is handled by GitOps workflows, so the site stays reliable and up to date with minimal manual work.<br><br>
                <b>Security & Maintenance:</b> I keep my site safe and up to date using my own <a href="https://galaxy.ansible.com/ui/repo/published/gregheffner/ubuntu_patching/">Ansible collection</a> for server hardening, and I run weekly patching actions to apply the latest security updates automatically. This means vulnerabilities are fixed quickly and configuration drift is kept in check.<br><br>
                <b>Automation & Transparency:</b> All automation, security scanning, and documentation for infrastructure changes are handled by open source tools and workflows. Every patch, deployment, and compliance check is tracked, auditable, and visible in my public repos—so you can see exactly how things run and stay secure. Explore the code and workflows here:
                <ul style="margin-top: 6px;">
                    <li><a href="https://galaxy.ansible.com/ui/repo/published/gregheffner/ubuntu_patching/">Ansible Collection (Server Hardening)</a></li>
                    <li><a href="https://github.com/gregheffner/ansible-collection-ubuntu-patching">Weekly Patching Actions</a></li>
                    <li><a href="https://github.com/GregHeffner/cicd">CI/CD & Infra as Code</a></li>
                </ul>
            </div>
            <ul>
                <li>GitOps: All changes are version-controlled and deployed automatically</li>
                <li>ArgoCD: Manages rollouts, syncs, and health checks for every service</li>
                <li>Kubernetes: Provides self-healing, scaling, and high availability</li>
                <li>Ansible: Automates server hardening and config management</li>
                <li>Weekly Patching: Automated GitHub Actions keep everything secure and current</li>
            </ul>
            <h3>How to Learn</h3>
            <ul>
                <li><a href="https://tryhackme.com"><b>TryHackMe</b></a>: My go-to for CTFs, hands-on labs, and free courses.</li>
