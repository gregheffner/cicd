        <title>Nerdsense - A Blog</title>
        <style>
            :root {
                --bg: #0d1117;
                --card-bg: #161b22;
                --card-border: #30363d;
                --text: #e6edf3;
                --muted: #8b949e;
                --accent: #58a6ff;
                --green: #3fb950;
                --mono: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, Consolas, monospace;
            }
            body {
                background-color: var(--bg);
                color: var(--text);
                font-family: system-ui, sans-serif;
                line-height: 1.6;
                padding: 20px;
            }
            h1, h2, h3 {
                font-family: var(--mono);
                line-height: 1.25;
            }
            a {
                color: var(--accent);
                text-decoration: underline;
                text-underline-offset: 3px;
            }
            a:hover {
                text-decoration-color: var(--green);
            }
            a:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
            }
            .navbar {
                display: flex;
                justify-content: flex-end;
                width: 100%;
                background-color: transparent !important;
                padding-right: 15px;
                padding-left: 15px;
            }
            .header {
                background-color: var(--card-bg);
                color: var(--text);
                border: 1px solid var(--card-border);
                border-radius: 10px;
                padding: 10px;
            }
            .header h1 {
                font-size: clamp(1.4rem, 5vw, 2.5rem);
                margin: 10px 0;
            }
            .card, .scrollcard {
                background-color: var(--card-bg);
                color: var(--text);
                border: 1px solid var(--card-border);
                border-radius: 10px;
                padding: 20px;
            }
            .rightcolumn .card h3, .rightcolumn .scrollcard h3 {
                color: var(--green);
            }
            /* Top Blogs: neutralize the shared marquee, render as a plain list */
            .scrollcard {
                height: auto;
                overflow: visible;
                margin-top: 20px;
            }
            .scroll-container {
                height: auto;
                overflow: visible;
            }
            .scroll-container nav {
                position: static;
                animation: none;
            }
            .scroll-container ul {
                margin: 0;
                padding-left: 1.2em;
            }
            .scroll-container ul br {
                display: none;
            }
            .rightcolumn li {
                margin-bottom: 10px;
            }
            .rightcolumn img {
                width: 100%;
                height: auto;
                border: 1px solid var(--card-border);
                border-radius: 6px;
            }
            /* Article cards */
            .blog-box {
                position: relative;
                display: flex;
                align-items: stretch;
                gap: 16px;
                width: 100%;
                max-width: 640px;
                box-sizing: border-box;
                background-color: var(--bg);
                border: 1px solid var(--card-border);
                border-radius: 10px;
                padding: 16px;
                margin: 0 auto 16px;
            }
            .blog-box h3 a::after {
                content: "";
                position: absolute;
                inset: 0;
            }
            .blog-box:focus-within {
                border-color: var(--accent);
            }
            .blog-image-container {
                flex: 1;
                min-width: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .blog-image-container img {
                max-width: 100%;
                max-height: 240px;
                width: auto;
                height: auto;
                object-fit: contain;
                display: block;
                border-radius: 6px;
            }
            .blog-description {
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .blog-description h3 {
                margin: 0 0 8px;
                font-size: 1.1rem;
            }
            .blog-description p {
                color: var(--muted);
                font-family: var(--mono);
                font-size: 0.9rem;
                margin: 0;
            }
            .blog-description p.blog-note {
                color: var(--green);
                margin-top: 10px;
            }
            @media (prefers-reduced-motion: no-preference) {
                .blog-box {
                    transition: transform 0.2s ease, border-color 0.2s ease;
                }
                .blog-box:hover {
                    transform: translateY(-4px);
                    border-color: var(--accent);
                }
            }
            #search-container {
                margin: 20px auto;
                text-align: center;
            }
            #search-input {
                padding: 10px;
                width: min(75%, 480px);
                font-size: 16px;
                font-family: var(--mono);
                background-color: var(--card-bg);
                color: var(--text);
                border: 1px solid var(--card-border);
                border-radius: 6px;
            }
            #search-container button {
                padding: 10px 16px;
                font-size: 16px;
                font-family: var(--mono);
                background-color: var(--card-bg);
                color: var(--accent);
                border: 1px solid var(--card-border);
                border-radius: 6px;
                cursor: pointer;
            }
            #search-container button:hover {
                border-color: var(--accent);
            }
            .visually-hidden {
                position: absolute !important;
                width: 1px; height: 1px;
                padding: 0; margin: -1px;
                overflow: hidden;
                clip: rect(0,0,0,0);
                border: 0;
            }
            @media (max-width: 768px) {
                body {
                    padding: 12px;
                }
                .blog-box {
                    flex-direction: column-reverse;
                }
                .blog-image-container img {
                    max-height: 200px;
                }
            }
        </style>
    </head>

