                    var thumb = g.querySelector('img');
                    var desc = g.querySelector('.desc');
                    if (!a || !thumb) return;
                    a.addEventListener('click', function (e) {
                        e.preventDefault();
                        img.src = a.href;
                        img.alt = thumb.alt;
                        cap.textContent = desc ? desc.textContent : '';
                        dlg.showModal();
