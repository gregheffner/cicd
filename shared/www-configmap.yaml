    <!DOCTYPE html>
    <html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>2026 Mustang Dark Horse</title>
        <meta name="description" content="2026 Mustang Dark Horse quick links">
        <meta name="robots" content="noindex">
        <meta name="theme-color" content="#000000">
        <link rel="canonical" href="https://greg.heffner.live/CarPlay.html">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://greg.heffner.live/CarPlay.html">
        <meta property="og:title" content="2026 Mustang Dark Horse">
        <meta property="og:description" content="2026 Mustang Dark Horse quick links">
        <meta name="twitter:card" content="summary">
        <meta name="twitter:title" content="2026 Mustang Dark Horse">
        <meta name="twitter:description" content="2026 Mustang Dark Horse quick links">
        <style>
            /* Custom properties */
            :root {
                --footer-height: 80px;
                --accent-blue: #4fb3ff;
                --accent-blue-2: #1e88e5;
                --accent-green: #00ff00;
            }
    
            /* Base */
            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
    
            body {
                background: #000;
                color: #fff;
                font-family: sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 42px 0 calc(var(--footer-height) + 36px) 0;
            }
    
            header,
            footer {
                text-align: center;
                margin: 0 auto;
            }
    
            main {
                width: 100%;
            }
    
            /* Hero card */
            .mustang-header {
                width: 92vw;
                max-width: 980px;
                margin: 22px auto 6px auto;
                text-align: center;
            }
    
            .hero-card {
                position: relative;
                display: block;
                width: min(980px, 92vw);
                border-radius: 36px;
                border: 1px solid rgba(255, 255, 255, 0.10);
                background:
                    radial-gradient(120% 160% at 10% 0%, rgba(0, 255, 0, 0.10) 0%, rgba(0, 255, 0, 0.00) 55%),
                    radial-gradient(120% 160% at 85% 10%, rgba(79, 179, 255, 0.20) 0%, rgba(79, 179, 255, 0.00) 60%),
                    radial-gradient(160% 160% at 50% 0%, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.00) 55%),
                    linear-gradient(180deg, rgba(12, 14, 18, 0.92), rgba(4, 5, 6, 0.92));
                box-shadow: 0 18px 70px rgba(0, 0, 0, 0.75);
                padding: 22px 22px 24px 22px;
                overflow: hidden;
                -webkit-backdrop-filter: blur(10px);
                backdrop-filter: blur(10px);
                transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
            }
    
            .hero-card:hover {
                transform: translateY(-2px);
                border-color: rgba(255, 255, 255, 0.16);
                box-shadow: 0 22px 85px rgba(0, 0, 0, 0.82);
            }
    
            .hero-card::before {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.035) 0 1px, rgba(255, 255, 255, 0.00) 1px 22px),
                    repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0 1px, rgba(255, 255, 255, 0.00) 1px 22px);
                opacity: 0.10;
                pointer-events: none;
            }
    
            .hero-card::after {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.00) 38%, rgba(0, 0, 0, 0.30)),
                    linear-gradient(110deg, rgba(79, 179, 255, 0.0) 0%, rgba(79, 179, 255, 0.12) 35%, rgba(0, 255, 0, 0.08) 55%, rgba(0, 0, 0, 0.0) 80%);
                opacity: 0.75;
                pointer-events: none;
            }
    
            .hero-inner {
                position: relative;
                z-index: 1;
            }
    
            .hero-media {
                position: absolute;
                right: -40px;
                bottom: -50px;
                width: min(520px, 55vw);
                pointer-events: none;
                z-index: 0;
                opacity: 0.32;
                filter: drop-shadow(0 18px 48px rgba(0, 0, 0, 0.75)) saturate(1.05);
            }
    
            .hero-car {
                width: 100%;
                height: auto;
                display: block;
                transform: rotate(-2deg);
            }
    
            .hero-topbar-wrap {
                position: relative;
                margin: 6px 10px 22px 10px;
            }
    
            .hero-topcap {
                position: absolute;
                top: -14px;
                left: 50%;
                transform: translateX(-50%);
                width: 44px;
                height: 16px;
                border-radius: 999px;
                background: linear-gradient(180deg, rgba(133, 197, 255, 0.95), rgba(79, 179, 255, 0.75));
                box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.10), 0 10px 26px rgba(79, 179, 255, 0.28);
                opacity: 0.92;
            }
    
            .hero-topbar {
                height: 16px;
                border-radius: 999px;
                background: linear-gradient(90deg, rgba(30, 136, 229, 0.95), rgba(79, 179, 255, 0.95), rgba(30, 136, 229, 0.95));
                box-shadow: 0 0 26px rgba(79, 179, 255, 0.42);
                opacity: 0.92;
                position: relative;
                overflow: hidden;
            }
    
            .hero-topbar::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(110deg, rgba(255, 255, 255, 0.0) 0%, rgba(255, 255, 255, 0.22) 40%, rgba(255, 255, 255, 0.0) 80%);
                transform: translateX(-60%);
                animation: topbar-shine 4.8s ease-in-out infinite;
                opacity: 0.55;
            }
    
            @keyframes topbar-shine {
                0% {
                    transform: translateX(-65%);
                }
    
                55% {
                    transform: translateX(65%);
                }
    
                100% {
                    transform: translateX(65%);
                }
            }
    
            .hero-content {
                display: grid;
                grid-template-columns: 1.35fr 1fr;
                align-items: center;
                gap: 10px 34px;
                padding: 0 14px 8px 14px;
            }
    
            .hero-left {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
    
            .hero-right {
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 12px;
            }
    
            .hero-handle {
                margin: 0;
                font-family: 'Fira Mono', 'Consolas', 'Menlo', monospace;
                font-size: clamp(3.0rem, 7.4vw, 5.8rem);
                font-weight: 900;
                letter-spacing: 0.045em;
                color: var(--accent-green);
                text-shadow: 0 0 22px rgba(0, 255, 0, 0.55), 0 0 6px rgba(0, 255, 0, 0.75);
                line-height: 0.98;
            }
    
            .hero-subline {
                display: flex;
                align-items: center;
                gap: 10px;
                font-family: 'Fira Mono', 'Consolas', 'Menlo', monospace;
                color: rgba(255, 255, 255, 0.72);
                letter-spacing: 0.08em;
            }
    
            .hero-pill {
                display: inline-flex;
                align-items: center;
                padding: 6px 10px;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.14);
                background: rgba(0, 0, 0, 0.35);
                box-shadow: 0 0 0 1px rgba(79, 179, 255, 0.10), 0 10px 26px rgba(0, 0, 0, 0.35);
                color: rgba(133, 197, 255, 0.92);
                font-weight: 900;
                letter-spacing: 0.18em;
                text-transform: uppercase;
            }
    
            .hero-meta {
                font-size: 0.95rem;
                opacity: 0.9;
            }
    
            .hero-model-year {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 6px 12px;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.14);
                background: rgba(0, 0, 0, 0.28);
                box-shadow: 0 0 0 1px rgba(79, 179, 255, 0.10), 0 10px 26px rgba(0, 0, 0, 0.35);
                font-size: 1.0rem;
                font-weight: 900;
                letter-spacing: 0.20em;
                color: rgba(133, 197, 255, 0.92);
                text-shadow: 0 0 12px rgba(79, 179, 255, 0.22);
            }
    
            .hero-model-name {
                margin: 0;
                font-size: clamp(1.9rem, 4.6vw, 3.6rem);
                font-weight: 900;
                letter-spacing: 0.46em;
                color: rgba(133, 197, 255, 0.95);
                text-shadow: 0 0 18px rgba(79, 179, 255, 0.35);
                text-transform: uppercase;
                line-height: 1.05;
            }
    
            .hero-kicker {
                display: flex;
                align-items: center;
                gap: 12px;
                font-weight: 900;
                letter-spacing: 0.32em;
                color: rgba(255, 255, 255, 0.72);
                text-transform: uppercase;
            }
    
            /* Quick-link tiles (grid replicates the old table's metrics) */
            .tile-grid {
                list-style: none;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px 20px;
                width: 90vw;
                max-width: 600px;
                margin: 36px auto 0 auto;
                padding: 24px 20px;
                box-sizing: border-box;
            }
    
            /* Keep the top-right cell empty: Homepage starts row 2 */
            .tile-grid > li:nth-child(2) {
                grid-column: 1;
            }
    
            .tile-grid a img {
                width: 100%;
                max-width: 140px;
                aspect-ratio: 1 / 1;
                height: auto;
                background: #fff;
                border-radius: 16px;
                padding: 16px;
                box-sizing: border-box;
                border: 2px solid #333;
                transition: box-shadow 0.2s;
                object-fit: contain;
                display: block;
                margin: 0 auto;
            }
    
            .tile-grid a img:hover,
            .tile-grid a:focus-visible img {
                box-shadow: 0 0 12px #fff8;
            }
    
            .tile-grid a:focus-visible,
            .footer-bar a:focus-visible {
                outline: 2px solid var(--accent-blue);
                outline-offset: 3px;
            }
    
            /* Showcase image */
            .showcase-car {
                display: block;
                margin: 0 auto 18px auto;
                width: 55%;
                height: auto;
            }
    
            /* Footer launcher bar */
            footer {
                width: 100vw;
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                margin: 0;
                padding: 0;
                z-index: 100;
            }
    
            .footer-bar {
                display: flex;
                justify-content: center;
                align-items: center;
                background: #222;
                padding: 12px 0;
                width: 100vw;
                gap: 24px;
                box-shadow: 0 -2px 8px #0008;
            }
    
            .footer-bar a img,
            .footer-bar a svg.footer-svg {
                width: 28px;
                height: 28px;
                max-width: 28px;
                max-height: 28px;
                display: block;
                margin: 0;
                padding: 0;
                object-fit: contain;
            }
    
            .footer-bar a {
                background: #0074D9;
                border-radius: 12px;
                width: 48px;
                height: 48px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.2s, box-shadow 0.2s;
                box-shadow: 0 2px 8px #0004;
                margin: 0 6px;
                padding: 0;
                box-sizing: border-box;
            }
    
            /* Drag-around car toy */
            .car-animation {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                pointer-events: none;
                z-index: 100;
            }
    
            #car {
                position: absolute;
                top: 0;
                left: 0;
                animation: drive-around 12s linear infinite;
                transform-origin: 50% 50%;
                cursor: grab;
                pointer-events: auto;
                touch-action: none;
                -webkit-user-select: none;
                user-select: none;
            }
    
            .dragging {
                animation: none !important;
                cursor: grabbing;
            }
    
            @keyframes drive-around {
                0% {
                    top: 0;
                    left: 0;
                    transform: rotate(0deg) scaleX(1);
                }
    
                24% {
                    top: 0;
                    left: calc(100vw - 60px);
                    transform: rotate(0deg) scaleX(1);
                }
    
                25% {
                    top: 0;
                    left: calc(100vw - 60px);
                    transform: rotate(90deg) scaleY(-1);
                }
    
                49% {
                    top: calc(100vh - var(--footer-height) - 30px);
                    left: calc(100vw - 60px);
                    transform: rotate(90deg) scaleY(-1);
                }
    
                50% {
                    top: calc(100vh - var(--footer-height) - 30px);
                    left: calc(100vw - 60px);
                    transform: rotate(180deg) scaleY(-1);
                }
    
                74% {
                    top: calc(100vh - var(--footer-height) - 30px);
                    left: 0;
                    transform: rotate(180deg) scaleY(-1);
                }
    
                75% {
                    top: calc(100vh - var(--footer-height) - 30px);
                    left: 0;
                    transform: rotate(270deg) scaleY(-1);
                }
    
                99% {
                    top: 0;
                    left: 0;
                    transform: rotate(270deg) scaleY(-1);
                }
    
                100% {
                    top: 0;
                    left: 0;
                    transform: rotate(0deg) scaleX(1);
                }
            }
    
