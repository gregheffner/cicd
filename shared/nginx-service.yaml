apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-web
  name: nginx-service
  namespace: prod
spec:
  # P1: externalTrafficPolicy Cluster (was Local). Public ingress now comes from the
  # in-cluster cloudflared Deployments, which reach this Service over cluster DNS
  # (nginx-service.prod.svc.cluster.local:80) — east-west traffic, so ETP does not
  # affect that path. Cluster stays as the safe default: Cloudflare supplies the real
  # client IP via X-Forwarded-For (what fail2ban bans on), so SNAT does not break
  # bans, and any node can route to a Ready pod, keeping the blue/green flip safe.
  externalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 80
      targetPort: http
    # rec #13: stub_status (:81 -> targetPort nginx-status/8081) removed from the public
    # LoadBalancer. Datadog scrapes it on the pod IP (:8081) directly, not via the Service.
  selector:
    app: nginx-web
    version: blue
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-blue
  namespace: prod
spec:
  maxReplicas: 3
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-blue
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization            # was AverageValue "3000m" (vs 100m req -> never scaled); blue now requests 250m
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # rec #16: anti-flap. Inert while min==max==3 (1-per-node affinity cap); takes effect only if maxReplicas is raised.
---
# P5: HPA for the green Deployment so green is promotable + autoscaling-symmetric.
# Both colors use Utilization 70% (each nginx container requests cpu: 250m).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-green
  namespace: prod
spec:
  maxReplicas: 3
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-green
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # rec #16: anti-flap. Inert while min==max==3 (1-per-node affinity cap); takes effect only if maxReplicas is raised.
