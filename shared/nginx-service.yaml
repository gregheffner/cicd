apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-web
    k8slens-edit-resource-version: v1
  name: nginx-service
  namespace: prod
spec:
  # P1 (Step B): Cluster (was Local). Ingress is a Cloudflare Tunnel (cloudflared on
  # host m1) -> node:nodePort; it does NOT use the Service healthCheckNodePort that
  # Local allocates, and Cloudflare supplies the real client IP via X-Forwarded-For
  # (which fail2ban bans on), so SNAT under Cluster does not break bans. Cluster also
  # lets any node route to a Ready pod, which makes the eventual blue/green flip safe.
  externalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 80
    - name: nginx-status
      port: 81
  selector:
    app: nginx-web
    version: blue
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-blue
  namespace: prod
spec:
  maxReplicas: 10
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-blue
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization            # was AverageValue "3000m" (vs 100m req -> never scaled); blue now requests 250m
          averageUtilization: 70
---
# P5: HPA for the green Deployment so green is promotable + autoscaling-symmetric.
# Both colors use Utilization 70% (each nginx container requests cpu: 250m).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-green
  namespace: prod
spec:
  maxReplicas: 10
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-green
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
