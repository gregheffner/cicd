apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-web
    k8slens-edit-resource-version: v1
  name: nginx-service
  namespace: prod
spec:
  # P1 (Step B): Cluster (was Local). Ingress is a Cloudflare Tunnel (cloudflared on
  # host m1) -> node:nodePort; it does NOT use the Service healthCheckNodePort that
  # Local allocates, and Cloudflare supplies the real client IP via X-Forwarded-For
  # (which fail2ban bans on), so SNAT under Cluster does not break bans. Cluster also
  # lets any node route to a Ready pod, which makes the eventual blue/green flip safe.
  externalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ports:
    - name: http
      port: 80
    - name: nginx-status
      port: 81
  selector:
    app: nginx-web
    version: blue
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-blue
  namespace: prod
spec:
  maxReplicas: 10
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-blue
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: AverageValue
          averageValue: "3000m"
---
# P5 (Step A): HPA for the green Deployment so green is promotable + autoscaling-symmetric.
# Utilization 70% is meaningful because the green nginx container requests cpu: 250m.
# (The blue HPA above stays on its existing AverageValue until Step C, which pairs the
# fix with blue's requests bump to 250m — changing it here while blue still requests
# 100m is deferred to avoid coupling a blue change into the green-only step.)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-web-green
  namespace: prod
spec:
  maxReplicas: 10
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-web-green
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
