apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: prod
data:
  nginx.conf: |-
    user  nginx;
    worker_processes  auto;
    worker_rlimit_nofile 8192;               # rec #23: raise per-worker fd ceiling (pairs with worker_connections)

    error_log  /var/log/nginx/error.log crit;
    error_log  /dev/stderr;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  4096;            # rec #23: was 1024 (per-worker conn ceiling the HPA can't relieve)
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        server_tokens off;                       # rec #13: don't leak nginx version

        open_file_cache max=1000 inactive=20s;   # rec #10: cache static fd/metadata
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'HIGH:!aNULL:!MD5:!3DES';
        ssl_prefer_server_ciphers on;

        set_real_ip_from 0.0.0.0/0;
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        map $http_x_forwarded_for $real_client_ip {
            ~^(?<ip>[^,]+) $ip;
            default $remote_addr;
        }

        log_format fail2ban '$real_client_ip - [$time_local] "$request" $status "$http_referer" "$http_user_agent"';

        map $status $loggable {
            ~^[23]  1;
            default 0;
        }
        map $request_method $loggable {
            default 1;
            HEAD 0;
        }
        access_log  /var/log/nginx/access.log  fail2ban;
        access_log /dev/stdout fail2ban;
        sendfile        on;
        tcp_nopush     on;
        tcp_nodelay    on;                       # rec #23: low-latency flush for keep-alive responses
        keepalive_timeout  65;
        gzip  on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        gzip_min_length 256;
        gzip_comp_level 5;
        gzip_vary on;

        # rec #18: origin rate-limit backstop. Cloudflare is the primary rate limiter;
        # this protects the origin if the tunnel IP leaks. Keyed on the real client IP
        # (the CF-supplied XFF), not the tunnel source, so it limits per visitor.
        limit_req_zone $real_client_ip zone=req_per_ip:10m rate=30r/s;
        limit_conn_zone $real_client_ip zone=conn_per_ip:10m;
        limit_req_status 429;
        limit_conn_status 429;

        include /etc/nginx/conf.d/status.conf;

        server {
          listen 8080;
          # rec #18: apply the origin backstop to all locations. The trivial /healthz
          # probe and Datadog (:8081, separate server) stay well under these; real users
          # behind CF rarely sustain 30 r/s, and the generous burst avoids limiting a
          # legit multi-asset page load.
          limit_req zone=req_per_ip burst=60 nodelay;
          limit_conn conn_per_ip 30;
          # rec #14: server-level security headers (CSP intentionally NOT global —
          # the site loads GTM/AdSense/Cookiebot/Clarity/jsdelivr/Google Fonts +
          # inline scripts; a strict CSP would break them. CSP stays image-scoped.)
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "SAMEORIGIN" always;
          add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          # backlog 2026-07-02: CSP limited to directives that cannot break the ad/
          # analytics stack (script/style/img/frame loading untouched — the full-CSP
          # decision from rec #14 stands). Mirrors XFO, blocks <base> hijack + plugins.
          add_header Content-Security-Policy "frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
          add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

          location = /healthz {        # rec #7/#22: cheap liveness endpoint, no disk, no log
              access_log off;
              default_type text/plain;
              return 200 "ok";
          }
          # rec #19: browsers/iOS auto-request these root icons. Serve the REAL binaries from
          # the images hostPath (mounted at .../html/image) — they were 3 base64-text blobs in
          # www-configmap (~32% of it) that actually served broken; now removed. No precomposed
          # file on disk, so alias it to the regular apple-touch-icon.
          location = /favicon.ico {
              alias /usr/share/nginx/html/image/favicon.ico;
              access_log off;
              expires 1y;
              add_header Cache-Control "public, max-age=31536000, no-transform";
          }
          location = /apple-touch-icon.png {
              alias /usr/share/nginx/html/image/apple-touch-icon.png;
              expires 1y;
              add_header Cache-Control "public, max-age=31536000, no-transform";
          }
          location = /apple-touch-icon-precomposed.png {
              alias /usr/share/nginx/html/image/apple-touch-icon.png;
              expires 1y;
              add_header Cache-Control "public, max-age=31536000, no-transform";
          }
          location ~* wlwmanifest\.xml$ { return 444; }
          location ~* xmlrpc\.php { return 444; }
          location = /wp-login.php { deny all; return 444; }
          location ~* ^/(wp-admin|wp-includes) { deny all; return 444; }
          location /image/ {
              root /usr/share/nginx/html;   # fix: 'root' appends the URI; .../html/image doubled to /image/image/* -> 404 on every image (assets are the volume mounted at .../html/image)
              expires 1y;
              add_header Cache-Control "public, max-age=31536000, no-transform";
              add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';";
              add_header X-Content-Type-Options "nosniff" always;   # rec #14 (add_header doesn't inherit into a location with its own add_header)
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          }
          # rec #13: removed `ignore_invalid_headers off;` — restore secure default (reject malformed headers)

          location / {
              root /usr/share/nginx/html;
              index index.html index.htm;
              # rec #11: HTML is un-fingerprinted and changes every deploy. Short TTL +
              # must-revalidate so a missed edge purge self-heals fast — instead of
              # inheriting the 1y asset cache, which made the CF purge load-bearing.
              add_header Cache-Control "public, max-age=300, must-revalidate" always;
              add_header X-Content-Type-Options "nosniff" always;   # rec #14 (re-stated: this location sets its own add_header)
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
              add_header Content-Security-Policy "frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
              add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
          }
          location = /sitemap.xml {
              default_type application/xml;
              root /usr/share/nginx/html;
          }
          location /images/ {
              root /usr/share/nginx/html/images;
              expires 1y;
              add_header Cache-Control "public, max-age=31536000, no-transform";
              add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline';";
              add_header X-Content-Type-Options "nosniff" always;   # rec #14
              add_header X-Frame-Options "SAMEORIGIN" always;
              add_header Referrer-Policy "strict-origin-when-cross-origin" always;
          }
        }
    }
  status.conf: |
    server {
      listen 8081;
      location /nginx_status {
        stub_status;
        access_log off;
        # rec #13: :81 is no longer exposed on the public LoadBalancer (dropped from the
        # Service); only reachable in-cluster (Datadog scrapes the pod IP at :8081 directly).
        allow all;
        # server_tokens inherits `off` from http{} (rec #13)
      }
    }
