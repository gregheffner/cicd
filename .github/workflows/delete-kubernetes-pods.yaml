name: Delete all Pods (Selection)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Namespace to delete pods from'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - automation
          - kubernetes-dashboard
          - default
          - prod
          - radar
          - kube-system
          - kube-flannel
  # No schedule: dispatch-only. The weekly-soak pipeline deploys via digest-pin +
  # ArgoCD, so no scheduled pod-bounce is needed. (P7)

# Serialize against the build/promote pipeline so a manual pod-delete never races
# a stage or a flip.
concurrency:
  group: nginx-pipeline
  cancel-in-progress: false

permissions: {}   # rec #12: kubectl via the self-hosted runner's own kubeconfig — no GITHUB_TOKEN scopes needed

jobs:
  delete-pods:
    runs-on: self-hosted
    steps:
      - name: Delete pods in selected namespaces
        run: |
          NS="${{ github.event_name == 'workflow_dispatch' && inputs.namespace || 'all' }}"

          # The 'all' sweep intentionally EXCLUDES 'prod' (live customer traffic —
          # deleting both blue+green colors at once = outage) and 'automation'
          # (ArgoCD itself — bouncing it stalls reconciliation). Target those
          # explicitly by name only if you really mean to. (P7)
          if [ "$NS" = "all" ]; then
            for ns in kubernetes-dashboard default radar kube-system kube-flannel; do
              kubectl delete pods --all -n "$ns"
            done
          else
            kubectl delete pods --all -n "$NS"
          fi
