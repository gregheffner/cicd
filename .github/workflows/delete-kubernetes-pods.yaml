name: Delete all Pods (Selection)

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Namespace to delete pods from'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - automation
          - kubernetes-dashboard
          - default
          - prod
          - radar
          - kube-system
          - kube-flannel
  # schedule DISARMED 2026-06-21: the Saturday NS=all run does `kubectl delete pods
  # --all -n automation`, which bounces ArgoCD itself and can stall reconciliation
  # mid-rollout. Dispatch-only during the Phase-1 prereq window. The branch
  # feat/weekly-soak-bluegreen carries a standby-only replacement for re-arming.
  # schedule:
  #   - cron: '0 8 * * 6'

jobs:
  delete-pods:
    runs-on: self-hosted
    steps:
      - name: Delete pods in selected namespaces
        run: |
          NS="${{ github.event_name == 'workflow_dispatch' && inputs.namespace || 'all' }}"

          if [ "$NS" = "all" ]; then
            for ns in automation kubernetes-dashboard default prod radar kube-system kube-flannel; do
              kubectl delete pods --all -n "$ns"
            done
          else
            kubectl delete pods --all -n "$NS"
          fi
