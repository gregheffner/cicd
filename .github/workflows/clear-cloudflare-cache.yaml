name: Clear Cloudflare Cache

on:
  workflow_dispatch:
  schedule:
    - cron: '59 23 * * 0'

permissions: {}   # rec #12: no checkout / no GitHub API — drop all GITHUB_TOKEN scopes

jobs:
  clear-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Purge Everything in Cloudflare Zone
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
