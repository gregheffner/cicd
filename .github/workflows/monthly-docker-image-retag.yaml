name: Monthly Docker Image Retag

on:
  workflow_dispatch:
  # schedule DISARMED 2026-06-21: this legacy workflow re-pushes :latest, rewrites
  # both color manifests to mutable tags, and flips the Service selector — it would
  # un-pin P0 digests and move live traffic. Superseded by build-stage-scan.yaml +
  # soak-gate-promote.yaml. Kept dispatch-only until removed at Phase-1 cutover.
  # schedule:
  #   - cron: '0 0 1 * *'
jobs:
  retag-latest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get current year and month
        id: date
        run: echo "TAG=v$(date +'%Y.%m')" >> $GITHUB_OUTPUT

      - name: Pull latest image
        run: docker pull technotuba/nginx:latest

      - name: Tag image with year.month
        run: docker tag technotuba/nginx:latest technotuba/nginx:${{ steps.date.outputs.TAG }}

      - name: Push new tag
        run: docker push technotuba/nginx:${{ steps.date.outputs.TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: pip install requests packaging
      
      - name: Generate Dockerfile with latest versions
        run: python .github/scripts/generate_dockerfile.py

      - name: Show generated Dockerfile
        run: cat Dockerfile

      # Build and LOAD locally first so the image can be scanned BEFORE it is published.
      - name: Build candidate image (load locally, do NOT push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: technotuba/nginx:latest

      # Security gate: fail the run (and skip the push) on any FIXABLE HIGH/CRITICAL CVE.
      # ignore-unfixed keeps unfixable upstream noise from blocking; a fixable CVE (e.g.
      # the OpenSSL libssl3/libcrypto3 findings now resolved by `apk upgrade`) blocks publish.
      - name: Trivy security gate (fail on fixable HIGH/CRITICAL before publishing)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: technotuba/nginx:latest
          scan-type: image
          scanners: vuln
          vuln-type: os,library
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          format: table
          exit-code: '1'

      - name: Push image after passing scan gate
        run: docker push technotuba/nginx:latest

      - name: Pull latest changes
        run: git pull --rebase

      - name: Get latest and previous tags from Docker Hub
        id: tags
        run: |
          python3 <<EOF
          import requests, os
          repo = "technotuba/nginx"
          url = f"https://hub.docker.com/v2/repositories/{repo}/tags?page_size=2&page=1&ordering=last_updated"
          resp = requests.get(url)
          tags = [result['name'] for result in resp.json()['results']]
          latest = tags[0] if len(tags) > 0 else "latest"
          previous = tags[1] if len(tags) > 1 else "latest"
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"LATEST={latest}\n")
              fh.write(f"PREVIOUS={previous}\n")
          EOF

      - name: Update green deployment to use latest image
        run: sed -i 's#technotuba/nginx:[^"]*#technotuba/nginx:${{ steps.tags.outputs.LATEST }}#g' DR/nginx-green.yaml

      - name: Update blue deployment to use previous image
        run: sed -i "s#technotuba/nginx:[^\"']*#technotuba/nginx:${{ steps.tags.outputs.PREVIOUS }}#g" prod/nginx-blue.yaml

      - name: Change only the Service selector from green to blue in nginx-service.yaml
        run: |
          awk '{
            if (!done && $0 ~ /^ *version: green/) {
              sub(/version: green/, "version: blue")
              done=1
            }
            print
          }' shared/nginx-service.yaml > tmp.yaml && mv tmp.yaml shared/nginx-service.yaml

      - name: Update Prod Silo badge to blue
        run: sed -i 's|<img alt="Prod Silo" src="https://img.shields.io/badge/Prod%20Silo-.*-.*?style=for-the-badge">|<img alt="Prod Silo" src="https://img.shields.io/badge/Prod%20Silo-blue-blue?style=for-the-badge">|' README.md

      - name: Update green badge in README to latest
        run: |
          sed -i 's|\(technotuba/nginx:\)[^"-]*\(-brightgreen?style=for-the-badge&logo=docker&logoColor=white"\)>|\1latest\2>|' README.md

      - name: Update README with current tags
        run: |
          python3 <<'EOF'
          import re
          
          # Read the README file
          with open('README.md', 'r') as f:
              content = f.read()
          
          print("Original README content (first 500 chars):")
          print(content[:500])
          
          # Define the tags
          latest_tag = "${{ steps.tags.outputs.LATEST }}"
          previous_tag = "${{ steps.tags.outputs.PREVIOUS }}"
          
          print(f"Latest tag: {latest_tag}")
          print(f"Previous tag: {previous_tag}")
          
          # Update only the Blue Image badge with the version tag
          blue_badge_pattern = r'(<img alt="Blue Image" src="https://img\.shields\.io/badge/blue--image-technotuba/nginx:)[^-]*(-blue\?style=for-the-badge&logo=docker&logoColor=white">)'
          
          if re.search(blue_badge_pattern, content):
              content = re.sub(blue_badge_pattern, r'\1' + previous_tag + r'\2', content)
              print(f"Updated Blue Image badge to use tag: {previous_tag}")
          else:
              print("Blue Image badge pattern not found")
          
          # Write back to README
          with open('README.md', 'w') as f:
              f.write(content)
              
          print("README update completed")
          EOF

      - name: Commit and push updated YAMLs
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add DR/nginx-green.yaml prod/nginx-blue.yaml README.md shared/nginx-service.yaml
          # Fail loudly on a real commit error; only no-op when there is genuinely nothing staged.
          git diff --cached --quiet || git commit -m "chore: update deployment images to latest and previous"
          git push
