name: Cloudflare block count

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  update-block-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0 (node24)

      - name: Get number of blocked IPs and update README badge
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          COUNT=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE_ID/firewall/access_rules/rules?mode=block&per_page=1000" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" | jq '[.result[] | select(.configuration.target=="ip")] | length')
          [ -n "$COUNT" ] || { echo "::error::failed to fetch block count"; exit 1; }
          # Update the count in the README "Cloudflare blocks" shields.io badge,
          # position-independently (matches the stable URL segment, not a neighbor line).
          sed -i -E 's#(/badge/Cloudflare%20blocks-)[^-]+(-red)#\1'"$COUNT"'\2#' README.md
          grep -q "Cloudflare%20blocks-${COUNT}-red" README.md || echo "::warning::block badge not found in README; nothing updated"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add README.md
          git commit -m "docs: update Cloudflare block badge [skip ci]" || echo "No changes to commit"
          git push
